name: CI / Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. run tests ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  # ── 2. deploy to VPS (only if tests pass) ────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets are set
        run: |
          echo "VPS_HOST is set: ${{ secrets.VPS_HOST != '' }}"
          echo "VPS_USER is set: ${{ secrets.VPS_USER != '' }}"
          echo "VPS_SSH_KEY is set: ${{ secrets.VPS_SSH_KEY != '' }}"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            REPO="https://github.com/raulpenaguiao/betting_helper"
            DEST="/opt/betting_helper"

            # First-time setup
            if [ ! -d "$DEST/.git" ]; then
              git clone "$REPO" "$DEST"
            fi

            cd "$DEST"
            git pull origin main

            # Create venv if missing
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Install systemd units
            cp deploy/betting-helper.service        /etc/systemd/system/
            cp deploy/betting-helper-update.service /etc/systemd/system/
            cp deploy/betting-helper-update.timer   /etc/systemd/system/
            systemctl daemon-reload

            # Restart app
            systemctl restart betting-helper

            # Ensure hourly sync timer is running
            systemctl enable --now betting-helper-update.timer

            echo "Deploy complete — $(date -u)"
